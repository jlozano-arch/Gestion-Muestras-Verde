<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gestión de Muestras de Café Verde{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="navbar-content">
            <div class="navbar-brand">
                <h1>☕ Indian Ecotrade</h1>
                <p>Gestión de Café Verde</p>
            </div>
            <ul class="navbar-menu">
                <li><a href="/">Dashboard</a></li>
                <li><a href="/samples">Muestras</a></li>
                <li><a href="/samples/new">Nueva Muestra</a></li>
                <li><a href="/compare">Comparador</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>&copy; 2026 Indian Ecotrade. Gestión de Café Verde.</p>
    </footer>

    <script>
        // Auto-hide flash messages
        document.querySelectorAll('.alert').forEach(alert => {
            setTimeout(() => {
                alert.style.display = 'none';
            }, 5000);
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
