<form id="tasting-form-element" method="post" action="/samples/{{ sample.id }}/tastings" class="tasting-form">
    <h4>Nueva Cata</h4>
    <input type="hidden" name="redirect" value="1">
    <div class="form-row">
        <div class="form-group">
            <label>Fecha de cata</label>
            <input type="date" name="tasting_date">
        </div>
        <div class="form-group">
            <label>Fecha de tueste</label>
            <input type="date" name="roast_date">
        </div>
    </div>
    
    <div class="form-row">
        <div class="form-group">
            <label>Evaluador *</label>
            <input type="text" name="evaluator" required placeholder="Nombre del evaluador">
        </div>
    </div>

    <fieldset>
        <legend>Análisis de Criba</legend>
        <div class="form-row">
            <div class="form-group"><label>Criba 18+ (%)</label><input type="number" name="sieve_18" required step="0.1" min="0" max="100"></div>
            <div class="form-group"><label>Criba 17 (%)</label><input type="number" name="sieve_17" step="0.1" min="0" max="100"></div>
            <div class="form-group"><label>Criba 16+ (%)</label><input type="number" name="sieve_16" required step="0.1" min="0" max="100"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>Criba 15 (%)</label><input type="number" name="sieve_15" step="0.1" min="0" max="100"></div>
            <div class="form-group"><label>Criba 14+ (%)</label><input type="number" name="sieve_14" required step="0.1" min="0" max="100"></div>
            <div class="form-group"><label>Criba 13 (%)</label><input type="number" name="sieve_13" step="0.1" min="0" max="100"></div>
        </div>
        <div class="form-row">
            <div class="form-group"><label>Criba 12 (%)</label><input type="number" name="sieve_12" step="0.1" min="0" max="100"></div>
            <div class="form-group"><label>Criba plato (%)</label><input type="number" name="sieve_plato" step="0.1" min="0" max="100"></div>
        </div>
    </fieldset>

    <fieldset>
        <legend>Defectos e Humedad</legend>
        <div class="form-row">
            <div class="form-group">
                <label>Humedad (%)</label>
                <input type="number" name="humidity" required step="0.1" min="0" max="20" placeholder="11.5">
            </div>
            <div class="form-group">
                <label>Defectos Primarios</label>
                <input type="number" name="defects_primary" value="0" step="1" min="0">
            </div>
            <div class="form-group">
                <label>Defectos Secundarios</label>
                <input type="number" name="defects_secondary" value="0" step="1" min="0">
            </div>
        </div>
    </fieldset>

    <fieldset>
        <legend>Resultado y valoración</legend>
        <div class="form-row">
            <div class="form-group"><label>Valoración (0-100)</label><input type="number" name="valuation" step="0.1" min="0" max="100"></div>
            <div class="form-group"><label>Resultado</label>
                <select name="result">
                    <option value="pending">Pendiente</option>
                    <option value="approved">Aprobada</option>
                    <option value="rejected">Rechazada</option>
                </select>
            </div>
        </div>
    </fieldset>

    <fieldset>
        <legend>Puntuaciones de Cata (0-10)</legend>
        <div class="form-row">
            <div class="form-group">
                <label>Aroma</label>
                <input type="number" name="aroma" required min="0" max="10" step="0.1">
            </div>
            <div class="form-group">
                <label>Acidez</label>
                <input type="number" name="acidity" required min="0" max="10" step="0.1">
            </div>
            <div class="form-group">
                <label>Cuerpo</label>
                <input type="number" name="body" required min="0" max="10" step="0.1">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Sabor</label>
                <input type="number" name="flavor" required min="0" max="10" step="0.1">
            </div>
            <div class="form-group">
                <label>Post-gusto</label>
                <input type="number" name="aftertaste" required min="0" max="10" step="0.1">
            </div>
            <div class="form-group">
                <label>Limpieza</label>
                <input type="number" name="cleanliness" required min="0" max="10" step="0.1">
            </div>
            <div class="form-group">
                <label>Balance</label>
                <input type="number" name="balance" required min="0" max="10" step="0.1">
            </div>
        </div>
    </fieldset>

    <fieldset>
        <legend>Observaciones</legend>
        <div class="form-group">
            <label>Notas de Cata</label>
            <textarea name="tasting_notes" rows="3" placeholder="Descripción detallada de la cata..."></textarea>
        </div>
        <div class="form-group">
            <label>Recomendaciones</label>
            <textarea name="recommendations" rows="3" placeholder="Recomendaciones técnicas o comerciales..."></textarea>
        </div>
    </fieldset>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Guardar Cata</button>
        <a href="/samples/{{ sample.id }}" class="btn btn-secondary">Cancelar</a>
    </div>
</form>

<script>
    document.getElementById('tasting-form-element').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const formData = new FormData(e.target);
            const response = await fetch(e.target.action, { method: 'POST', body: formData });
            if (response.status === 303) {
                window.location.href = `/samples/{{ sample.id }}`;
                return;
            }
            if (response.ok) {
                const data = await response.json();
                window.location.href = `/samples/${data.id ? data.id : '{{ sample.id }}'}`;
            } else {
                alert('Error al guardar la cata');
            }
    });
</script>
